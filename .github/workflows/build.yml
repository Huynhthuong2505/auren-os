name: Build AuRen

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Build AI Platform Dashboard
        run: |
          cd artifacts/ai-platform-dashboard
          pnpm build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: ai-platform-dashboard
          path: artifacts/ai-platform-dashboard/dist
